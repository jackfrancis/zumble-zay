apiVersion: v1
kind: ConfigMap
metadata:
  name: zumble-zay-config
data:
  # Non-secret runtime configuration. Secrets live in the Secret (see
  # secret.example.yaml). Override per-environment in an overlay.
  ADDR: ":8080"
  # Public URL used to build OAuth redirect URLs. MUST be the externally
  # reachable HTTPS URL of the Ingress. Override per environment.
  BASE_URL: "https://zumble-zay.example.com"
  ALLOWED_ORIGINS: "https://zumble-zay.example.com"
  # The Ingress terminates TLS, so the Secure cookie flag must be set.
  COOKIE_SECURE: "true"
  MICROSOFT_TENANT: "common"
  # Agent-runtime substrate: how the orchestrator launches agent jobs. The swap
  # is config-only (ADR 0012). "k8s-job" runs each agent job as a Kubernetes Job
  # (the deployed default — Kubernetes is the substrate; requires the launcher
  # RBAC and the runtime image). "k8s-pod" runs each as a bare Pod (no
  # retry/backoff or TTL GC — a lifecycle contrast). "inprocess" runs jobs in
  # the server process and is the code-level default for non-cluster runs
  # (local, tests, CI). An unknown value fails fast at startup.
  LAUNCHER: "k8s-job"
  # Out-of-process runtime settings, used only when LAUNCHER=k8s-job. These have
  # code defaults; override per environment. RUNTIME_SERVICE_ACCOUNT is optional
  # (the runtime only needs HTTP egress to ZZ, not the Kubernetes API).
  # RUNTIME_IMAGE: "localhost/zumble-zay-runtime:dev"
  # RUNTIME_NAMESPACE: "zumble-zay"
  # RUNTIME_ZZ_BASE_URL: "http://zumble-zay:8080"
  # RUNTIME_SERVICE_ACCOUNT: ""
  # Ranking model for llm-rank jobs (ADR 0011/0014). The AxisRanker speaks the
  # OpenAI-compatible chat-completions API, so any such endpoint works; the
  # default is GitHub Copilot. The model token is a SECRET (key AI_TOKEN in
  # zumble-zay-secrets); without it the ranker falls back to the deterministic
  # StubRanker (no external calls).
  AI_ENDPOINT: "https://api.githubcopilot.com/chat/completions"
  AI_MODEL: "claude-opus-4.8"
