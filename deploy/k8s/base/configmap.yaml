apiVersion: v1
kind: ConfigMap
metadata:
  name: zumble-zay-config
data:
  # Non-secret runtime configuration. Secrets live in the Secret (see
  # secret.example.yaml). Override per-environment in an overlay.
  ADDR: ":8080"
  # Public URL used to build OAuth redirect URLs. MUST be the externally
  # reachable HTTPS URL of the Ingress. Override per environment.
  BASE_URL: "https://zumble-zay.example.com"
  ALLOWED_ORIGINS: "https://zumble-zay.example.com"
  # The Ingress terminates TLS, so the Secure cookie flag must be set.
  COOKIE_SECURE: "true"
  MICROSOFT_TENANT: "common"
  # Agent-runtime substrate: how the orchestrator launches agent jobs. The swap
  # is config-only (ADR 0012). Consumed by the ORCHESTRATOR Deployment, not the
  # web tier (docs/adr/0023). "k8s-job" runs each agent job as a Kubernetes Job
  # (the deployed default — Kubernetes is the substrate; requires the launcher
  # RBAC and the runtime image). "k8s-pod" runs each as a bare Pod (no
  # retry/backoff or TTL GC — a lifecycle contrast). "k8s-pod-detached" runs each
  # as a bare Pod but does NOT watch it: completion comes solely from the
  # runtime's callback (ADR 0025), so it needs only Pod-create RBAC — the
  # in-cluster reference for a fully detached substrate. "inprocess" runs jobs in
  # the orchestrator process and is the code-level default for non-cluster runs
  # (local, tests, CI). "agent-sandbox" runs each job as a kubernetes-sigs
  # agent-sandbox Sandbox for gVisor/Kata isolation (ADR 0026) — an OPTIONAL
  # substrate compiled in only with `-tags agent_sandbox`; it also needs the
  # agent-sandbox controller + CRDs installed and the sandboxes RBAC rule.
  # "opensandbox" runs each job as an OpenSandbox sandbox through a remote
  # OpenSandbox lifecycle server (ADR 0027): set OPENSANDBOX_ENDPOINT (e.g.
  # https://opensandbox:8443/v1) and the OPENSANDBOX_API_KEY secret; it needs no
  # launcher RBAC, since OpenSandbox schedules the workload itself. An unknown (or
  # not-compiled-in) value fails fast at startup.
  LAUNCHER: "k8s-job"
  # Out-of-process runtime settings, used by the orchestrator when LAUNCHER is
  # k8s-job or k8s-pod. These have code defaults; override per environment.
  # RUNTIME_SERVICE_ACCOUNT is optional (the runtime only needs HTTP egress to
  # the web tier, not the Kubernetes API).
  # RUNTIME_IMAGE: "localhost/zumble-zay-runtime:dev"
  # RUNTIME_NAMESPACE: "zumble-zay"
  # RUNTIME_ZZ_BASE_URL: "http://zumble-zay:8080"
  # RUNTIME_SERVICE_ACCOUNT: ""
  # Model for the LLM runtimes (ADR 0011/0014). The runtimes speak the
  # OpenAI-compatible chat-completions API. A real model client is built when
  # EITHER AI_ENDPOINT or the AI_TOKEN secret is set; with neither, the runtime
  # falls back to the deterministic StubRanker (no external calls) — the safe
  # default. Enable the model one of two ways:
  #   - Direct provider: set the AI_TOKEN secret (key AI_TOKEN in
  #     zumble-zay-secrets). The endpoint defaults to GitHub Copilot; override
  #     with AI_ENDPOINT.
  #   - In-cluster LLM gateway (agentgateway): point AI_ENDPOINT at the gateway
  #     Service and DROP the runtime token (AI_TOKEN_SECRET_NAME=""); the gateway
  #     holds the provider key. See overlays/dev for a worked example.
  # AI_ENDPOINT: "https://api.githubcopilot.com/chat/completions"
  AI_MODEL: "claude-opus-4.8"
