apiVersion: apps/v1
kind: Deployment
metadata:
  name: zumble-zay
  labels:
    app.kubernetes.io/name: zumble-zay
    app.kubernetes.io/component: backend
spec:
  # Sessions and the worklist are in-memory today, so a cookie/session lives in
  # a single pod. Keep replicas at 1 until a shared session store and the cloud
  # worklist store land; then this can scale out (and add an HPA).
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zumble-zay
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zumble-zay
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: zumble-zay
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: zumble-zay:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: zumble-zay-config
            - secretRef:
                name: zumble-zay-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
