apiVersion: apps/v1
kind: Deployment
metadata:
  name: zumble-zay
  labels:
    app.kubernetes.io/name: zumble-zay
    app.kubernetes.io/component: backend
spec:
  # Sessions and the worklist are in-memory today, so a cookie/session lives in
  # a single pod. Keep replicas at 1 until a shared session store and the cloud
  # worklist store land; then this can scale out (and add an HPA).
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zumble-zay
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zumble-zay
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: zumble-zay
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: zumble-zay:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: zumble-zay-config
            - secretRef:
                name: zumble-zay-secrets
          env:
            # The orchestrator runs as a separate Deployment with its own identity
            # and the Pod-spawning RBAC (docs/adr/0023). Setting this routes the
            # web tier's control calls (ingest/converse/research/active) to that
            # process instead of a co-located orchestrator. The web tier holds no
            # launcher RBAC and no Kubernetes client.
            - name: CONTROL_PLANE_URL
              value: http://zumble-zay-orchestrator:8090
            # The web tier authenticates to the orchestrator's control API with its
            # own projected ServiceAccount token, validated by TokenReview — there is
            # no shared secret (docs/adr/0031, 0034). It re-reads the token from this
            # path per request as the kubelet rotates it.
            - name: CONTROL_PLANE_TOKEN_PATH
              value: /var/run/secrets/zumble-zay/control/token
          volumeMounts:
            - name: control-token
              mountPath: /var/run/secrets/zumble-zay/control
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        # The web tier's control-plane identity: a ServiceAccount token minted for
        # the orchestrator's audience, which the orchestrator validates via
        # TokenReview (docs/adr/0031, 0034). The kubelet rotates it in place; the
        # app re-reads it from the mount per request.
        - name: control-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: zumble-zay-orchestrator
                  expirationSeconds: 3600
