# Orchestrator control plane (docs/adr/0007, 0023). Its own Deployment, identity,
# and RBAC: this is the only workload that creates runtime Pods/Jobs, and it is
# not internet-facing (no Ingress, ClusterIP only). The web tier reaches its
# control API over the cluster network.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zumble-zay-orchestrator
  labels:
    app.kubernetes.io/name: zumble-zay
    app.kubernetes.io/component: orchestrator
spec:
  # The orchestrator holds in-memory job state and a worker pool, and a single
  # leader is wanted for the staleness reconciler's future move here (ADR 0007).
  # Keep at 1 until that state is shared and leader election lands.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zumble-zay
      app.kubernetes.io/component: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zumble-zay
        app.kubernetes.io/component: orchestrator
    spec:
      serviceAccountName: zumble-zay-orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: orchestrator
          image: zumble-zay-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: control
              containerPort: 8090
            # Prometheus metrics (docs/adr not required; observability). A separate
            # port from `control` so scraping never crosses the default-deny control
            # NetworkPolicy; opened to the monitoring namespace by an additive policy
            # in deploy/k8s/monitoring/. Served by cmd/orchestrator (METRICS_ADDR).
            - name: metrics
              containerPort: 9090
          envFrom:
            # Shares the config (LAUNCHER, RUNTIME_*, AI_*, CONTROL_PLANE_AUDIENCE /
            # CONTROL_PLANE_CALLERS — the per-service caller identity it enforces,
            # docs/adr/0031, 0034) and the Secret (SESSION_SECRET, AI_TOKEN, and in a
            # hardened deployment MINT_PRIVATE_KEY). It ignores web-only keys it does
            # not read (e.g. CONTROL_PLANE_URL is set only on the web Deployment).
            - configMapRef:
                name: zumble-zay-config
            - secretRef:
                name: zumble-zay-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: control
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: control
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
