# The orchestrator (its own Deployment, docs/adr/0023) creates and watches
# runtime workloads when LAUNCHER=k8s-job or k8s-pod (docs/adr/0012). Least
# privilege: namespaced, jobs plus pods (create/watch/delete the runtime
# workloads, read their logs), nothing cluster-wide. The binding targets the
# orchestrator ServiceAccount, so the internet-facing web tier holds none of it.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zumble-zay-launcher
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Optional agent-sandbox substrate (LAUNCHER=agent-sandbox, docs/adr/0026). It
  # is detached, so it only creates a Sandbox and lets it self-reap via scheduled
  # deletion; delete is for best-effort early cleanup. Harmless when unused (and
  # when the CRD is absent). Requires the agent-sandbox controller + CRDs.
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["create", "get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zumble-zay-launcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zumble-zay-launcher
subjects:
  - kind: ServiceAccount
    name: zumble-zay-orchestrator
---
# Per-service caller identity for the control API (docs/adr/0031, 0034). The
# orchestrator authenticates every control caller by its Kubernetes workload
# identity: it validates the web tier's projected ServiceAccount token via the
# TokenReview API, which requires the built-in system:auth-delegator ClusterRole
# (create on tokenreviews / subjectaccessreviews). This is read-only auth
# delegation — NOT spawn power. It is required in every environment now that the
# control API has no shared-secret fallback (CONTROL_PLANE_AUDIENCE is set in the
# base config).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zumble-zay-orchestrator-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: zumble-zay-orchestrator
