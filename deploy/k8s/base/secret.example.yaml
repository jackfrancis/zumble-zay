# TEMPLATE ONLY — do NOT commit real secrets.
#
# This file is intentionally excluded from kustomization.yaml. Create the real
# Secret out-of-band, ideally via a secrets manager (External Secrets, Sealed
# Secrets, or your cloud provider's CSI driver). For a quick dev cluster:
#
#   kubectl -n zumble-zay create secret generic zumble-zay-secrets \
#     --from-literal=SESSION_SECRET="$(openssl rand -base64 48)" \
#     --from-literal=CONTROL_PLANE_TOKEN="$(openssl rand -base64 48)" \
#     --from-literal=GITHUB_CLIENT_ID=... \
#     --from-literal=GITHUB_CLIENT_SECRET=... \
#     --from-literal=GOOGLE_CLIENT_ID=... \
#     --from-literal=GOOGLE_CLIENT_SECRET=... \
#     --from-literal=MICROSOFT_CLIENT_ID=... \
#     --from-literal=MICROSOFT_CLIENT_SECRET=...
#
# CONTROL_PLANE_TOKEN authenticates the web tier to the orchestrator's control
# API (docs/adr/0023); both Deployments read this Secret, so they share it.
#
# Job-token signing (docs/adr/0023): by default both tiers derive the Ed25519
# keypair from SESSION_SECRET, which is simple but means the web tier could also
# mint. For true issuer/verifier separation, generate an independent keypair
# (make mint-keys) and provision MINT_PRIVATE_KEY to the orchestrator ONLY
# and MINT_PUBLIC_KEY (config, not secret) to the web tier ONLY.
apiVersion: v1
kind: Secret
metadata:
  name: zumble-zay-secrets
  namespace: zumble-zay
type: Opaque
stringData:
  SESSION_SECRET: "REPLACE_ME_WITH_32+_BYTE_RANDOM"
  CONTROL_PLANE_TOKEN: "REPLACE_ME_WITH_32+_BYTE_RANDOM"
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  MICROSOFT_CLIENT_ID: ""
  MICROSOFT_CLIENT_SECRET: ""
