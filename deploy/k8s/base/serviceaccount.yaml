apiVersion: v1
kind: ServiceAccount
metadata:
  name: zumble-zay
---
# The orchestrator runs under its own identity (docs/adr/0023): the launcher RBAC
# binds to this ServiceAccount, not the web tier's, so Pod/Job-creation privilege
# stays off the internet-facing process.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zumble-zay-orchestrator
