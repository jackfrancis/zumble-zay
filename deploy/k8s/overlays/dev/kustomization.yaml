apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pin the namespace at the overlay level. The base sets it too, but that
# directive does NOT reach resources added by THIS overlay (e.g. agentgateway.yaml),
# which would otherwise land in the caller's current namespace. Setting it here
# keeps every resource — base and overlay — in zumble-zay.
namespace: zumble-zay

# Dev overlay: local cluster, no public TLS ingress (use `kubectl port-forward`).
resources:
  - ../../base
  # agentgateway as the in-cluster LLM egress proxy: agents call it instead of
  # the provider directly, and the provider key lives only in the gateway.
  - agentgateway.yaml

# Drop the public Ingress for local development.
patches:
  - target:
      kind: Ingress
      name: zumble-zay
    patch: |
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: zumble-zay
  # Give the web tier a projected ServiceAccount token scoped to the
  # orchestrator's audience and point the control client at it (docs/adr/0031).
  # The web tier presents this per request instead of the shared bearer; the
  # orchestrator validates it via TokenReview. This is the client half of the
  # OIDC caller-identity path turned on by CONTROL_PLANE_AUDIENCE below.
  - target:
      kind: Deployment
      name: zumble-zay
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: zumble-zay
      spec:
        template:
          spec:
            containers:
              - name: server
                env:
                  - name: CONTROL_PLANE_TOKEN_PATH
                    value: /var/run/secrets/zumble-zay/control/token
                volumeMounts:
                  - name: control-token
                    mountPath: /var/run/secrets/zumble-zay/control
                    readOnly: true
            volumes:
              - name: control-token
                projected:
                  sources:
                    - serviceAccountToken:
                        path: token
                        audience: zumble-zay-orchestrator
                        expirationSeconds: 3600

# Override config for local, non-TLS access via port-forward.
configMapGenerator:
  - name: zumble-zay-config
    behavior: merge
    literals:
      - BASE_URL=http://localhost:8080
      - ALLOWED_ORIGINS=http://localhost:8080
      - COOKIE_SECURE=false
      # Route the agents' model calls through the in-cluster agentgateway, and
      # DROP the runtime model token (the gateway holds the provider key). The
      # gateway's simplified LLM listener serves /chat/completions on :4000
      # (Service :80 -> :4000). If a bump changes that, fix this URL and
      # agentgateway.yaml together. Use the FQDN (not the short name) so runtimes
      # in ANOTHER namespace can resolve it: the OpenSandbox substrate spawns
      # sandboxes in opensandbox-system (docs/adr/0027), and a short name only
      # resolves in-namespace — silently dropping those jobs to the baseline ranker.
      - AI_ENDPOINT=http://zumble-zay-agentgateway.zumble-zay.svc.cluster.local/chat/completions
      - AI_TOKEN_SECRET_NAME=
      # Per-service caller identity for the control API (docs/adr/0031): the
      # orchestrator validates the web tier's projected ServiceAccount token via
      # TokenReview for this audience and checks the caller SA against the
      # allowlist. Read only by the orchestrator; harmless on the web tier, which
      # ignores these keys. The shared CONTROL_PLANE_TOKEN stays as the chain
      # fallback for co-located runs and migration.
      - CONTROL_PLANE_AUDIENCE=zumble-zay-orchestrator
      - CONTROL_PLANE_CALLERS=system:serviceaccount:zumble-zay:zumble-zay

images:
  - name: zumble-zay
    newName: localhost/zumble-zay
    newTag: dev
  - name: zumble-zay-orchestrator
    newName: localhost/zumble-zay-orchestrator
    newTag: dev
