# Substrate smoke test for the ray/kuberay launcher (docs/adr/0028).
#
# This is the SAME shape internal/raylauncher builds: entrypoint /runtime on the
# standing zz-ray cluster via clusterSelector, config passed through
# runtimeEnvYAML. It runs the runtime with no ZZ_* env on purpose, so /runtime
# fails fast on invalid configuration (exit 2) — which proves the image arch is
# correct and the runtime binary executes on the Ray cluster (the thing the
# launcher depends on). A real job carries the full ZZ_* env + a job token.
#
#   kubectl apply -f deploy/ray/rayjob-smoketest.yaml
#   kubectl -n zumble-zay get rayjob zz-smoketest -w
apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: zz-smoketest
  namespace: zumble-zay
spec:
  entrypoint: /runtime
  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 120
  clusterSelector:
    ray.io/cluster: zz-ray
  runtimeEnvYAML: |
    env_vars:
      ZZ_SMOKETEST: "1"
